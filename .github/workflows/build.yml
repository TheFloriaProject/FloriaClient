name: Build and Release

on:
    push:
        branches:
            - master

jobs:
    build:
        name: Build & Publish Release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Set up Java 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Set up Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 'lts/*'
                    cache: 'npm'
                    cache-dependency-path: screen/package-lock.json

            -   name: Make Gradle wrapper executable
                run: chmod +x ./gradlew

            -   name: Build mod
                run: ./gradlew build
                env:
                    REPSY_USERNAME: ${{ secrets.REPSY_USERNAME }}
                    REPSY_PASSWORD: ${{ secrets.REPSY_PASSWORD }}

            -   name: Get mod version and short hash
                id: meta
                run: |
                    VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}' | tr -d '[:space:]')
                    echo "version=$VERSION" | tee -a $GITHUB_OUTPUT
                    echo "short_sha=$(git rev-parse --short HEAD)" | tee -a $GITHUB_OUTPUT

            -   name: Upload build artifact
                uses: actions/upload-artifact@v4
                with:
                    name: mod-jar
                    path: build/libs/*.jar
                    if-no-files-found: error

            -   name: Create GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: v${{ steps.meta.outputs.version }}
                    name: ${{ steps.meta.outputs.short_sha }}
                    files: core/build/libs/*.jar
                    make_latest: true
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
