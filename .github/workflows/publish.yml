name: Publish to Maven

on:
    push:
        branches:
            - master

jobs:
    build:
        name: Build & Publish Release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up Java 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Set up Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 'lts/*'
                    cache: 'npm'
                    cache-dependency-path: screen/package-lock.json

            -   name: Install screen dependencies
                working-directory: screen
                run: npm install

            -   name: Make Gradle wrapper executable
                run: chmod +x ./gradlew

            -   name: Build and publish mod
                run: ./gradlew build publish
                env:
                    REPSY_USERNAME: ${{ secrets.REPSY_USERNAME }}
                    REPSY_PASSWORD: ${{ secrets.REPSY_PASSWORD }}
